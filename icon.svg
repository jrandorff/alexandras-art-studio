<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cdf2ff"/>
      <stop offset="100%" stop-color="#9fe3f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#water)"/>

  <!-- bubbles -->
  <circle cx="430" cy="80" r="22" fill="#ffffff" opacity="0.55"/>
  <circle cx="465" cy="140" r="12" fill="#ffffff" opacity="0.45"/>
  <circle cx="60" cy="110" r="15" fill="#ffffff" opacity="0.45"/>

  <!-- gills: three feathery fronds per side -->
  <g fill="#ff8fab" stroke="#e0709a" stroke-width="7">
    <ellipse cx="105" cy="140" rx="52" ry="18" transform="rotate(-38 105 140)"/>
    <ellipse cx="82"  cy="205" rx="55" ry="18" transform="rotate(-12 82 205)"/>
    <ellipse cx="95"  cy="272" rx="50" ry="18" transform="rotate(16 95 272)"/>
    <ellipse cx="407" cy="140" rx="52" ry="18" transform="rotate(38 407 140)"/>
    <ellipse cx="430" cy="205" rx="55" ry="18" transform="rotate(12 430 205)"/>
    <ellipse cx="417" cy="272" rx="50" ry="18" transform="rotate(-16 417 272)"/>
  </g>

  <!-- head -->
  <ellipse cx="256" cy="215" rx="152" ry="130" fill="#ffc9d9" stroke="#e0709a" stroke-width="10"/>

  <!-- eyes -->
  <circle cx="198" cy="200" r="17" fill="#3a2e39"/>
  <circle cx="314" cy="200" r="17" fill="#3a2e39"/>
  <circle cx="204" cy="194" r="6" fill="#ffffff"/>
  <circle cx="320" cy="194" r="6" fill="#ffffff"/>

  <!-- smile -->
  <path d="M232,246 Q256,268 280,246" fill="none" stroke="#3a2e39" stroke-width="9" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="172" cy="244" rx="22" ry="13" fill="#ffa3bd" opacity="0.85"/>
  <ellipse cx="340" cy="244" rx="22" ry="13" fill="#ffa3bd" opacity="0.85"/>

  <!-- big A -->
  <text x="256" y="478" font-family="Marker Felt, Chalkboard SE, Comic Sans MS, sans-serif"
        font-size="118" font-weight="bold" fill="#d6537d" text-anchor="middle">A</text>
</svg>
